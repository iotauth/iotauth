# This workflow runs the four entity integration tests (all combinations of
# C and Node.js clients and servers) in sequence.  The first script handles
# the full build and credential setup.  If it succeeds, the remaining three
# scripts reuse those artifacts (--no-build --no-setup).  If the first script
# fails, each subsequent script runs its own full build and setup so it is
# independent.  All four tests always run; the job fails if any of them fails.

# Author: Hokeun Kim

name: Entity Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    inputs:
      sst-c-api-ref:
        description: 'sst-c-api ref to test (overrides submodule pin)'
        required: false
        type: string

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out specific ref of sst-c-api
        if: ${{ inputs.sst-c-api-ref != '' }}
        uses: actions/checkout@v4
        with:
          repository: iotauth/sst-c-api
          path: entity/c
          ref: ${{ inputs.sst-c-api-ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install C build tools
        run: sudo apt-get install -y cmake make gcc libssl-dev

      - name: Make scripts executable
        run: chmod +x examples/scripts/*.sh examples/generateAll.sh examples/cleanAll.sh

      - name: Run c_client_c_server_test (build + setup)
        id: test1
        continue-on-error: true
        working-directory: ./examples/scripts
        run: ./c_client_c_server_test.sh

      - name: Run c_client_node_server_test
        id: test2
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./c_client_node_server_test.sh --no-build --no-setup
          else
            ./c_client_node_server_test.sh
          fi

      - name: Run node_client_c_server_test
        id: test3
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./node_client_c_server_test.sh --no-build --no-setup
          else
            ./node_client_c_server_test.sh
          fi

      - name: Run node_client_node_server_test
        id: test4
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./node_client_node_server_test.sh --no-build --no-setup
          else
            ./node_client_node_server_test.sh
          fi

      - name: Fail if any test failed
        if: always()
        run: |
          result=0
          for outcome in \
            "${{ steps.test1.outcome }}" \
            "${{ steps.test2.outcome }}" \
            "${{ steps.test3.outcome }}" \
            "${{ steps.test4.outcome }}"; do
            if [ "$outcome" != "success" ]; then
              echo "A test step did not succeed (outcome: $outcome)."
              result=1
            fi
          done
          exit $result
