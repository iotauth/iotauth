# This workflow runs the nine entity integration tests (all combinations of
# C, Node.js, and Python clients and servers) in sequence.  The first script handles
# the full build and credential setup.  If it succeeds, the remaining eight
# scripts reuse those artifacts (--no-build --no-setup).  If the first script
# fails, each subsequent script runs its own full build and setup so it is
# independent.  All nine tests always run; the job fails if any of them fails.

# Author: Hokeun Kim

name: Entity Integration Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install C build tools
        run: sudo apt-get install -y cmake make gcc libssl-dev

      - name: Make scripts executable
        run: chmod +x examples/scripts/*.sh examples/generateAll.sh examples/cleanAll.sh

      - name: Run c_client_c_server_test (build + setup)
        id: test1
        continue-on-error: true
        working-directory: ./examples/scripts
        run: ./c_client_c_server_test.sh

      - name: Run c_client_node_server_test
        id: test2
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./c_client_node_server_test.sh --no-build --no-setup --stop-existing
          else
            ./c_client_node_server_test.sh --stop-existing
          fi

      - name: Run node_client_c_server_test
        id: test3
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./node_client_c_server_test.sh --no-build --no-setup --stop-existing
          else
            ./node_client_c_server_test.sh --stop-existing
          fi

      - name: Run node_client_node_server_test
        id: test4
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./node_client_node_server_test.sh --no-build --no-setup --stop-existing
          else
            ./node_client_node_server_test.sh --stop-existing
          fi

      - name: Run c_client_python_server_test
        id: test5
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./c_client_python_server_test.sh --no-build --no-setup --stop-existing
          else
            ./c_client_python_server_test.sh --stop-existing
          fi

      - name: Run node_client_python_server_test
        id: test6
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./node_client_python_server_test.sh --no-build --no-setup --stop-existing
          else
            ./node_client_python_server_test.sh --stop-existing
          fi

      - name: Run python_client_c_server_test
        id: test7
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./python_client_c_server_test.sh --no-build --no-setup --stop-existing
          else
            ./python_client_c_server_test.sh --stop-existing
          fi

      - name: Run python_client_node_server_test
        id: test8
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./python_client_node_server_test.sh --no-build --no-setup --stop-existing
          else
            ./python_client_node_server_test.sh --stop-existing
          fi

      - name: Run python_client_python_server_test
        id: test9
        if: always()
        continue-on-error: true
        working-directory: ./examples/scripts
        run: |
          if [ "${{ steps.test1.outcome }}" = "success" ]; then
            ./python_client_python_server_test.sh --no-build --no-setup --stop-existing
          else
            ./python_client_python_server_test.sh --stop-existing
          fi

      - name: Fail if any test failed
        if: always()
        run: |
          result=0
          for outcome in \
            "${{ steps.test1.outcome }}" \
            "${{ steps.test2.outcome }}" \
            "${{ steps.test3.outcome }}" \
            "${{ steps.test4.outcome }}" \
            "${{ steps.test5.outcome }}" \
            "${{ steps.test6.outcome }}" \
            "${{ steps.test7.outcome }}" \
            "${{ steps.test8.outcome }}" \
            "${{ steps.test9.outcome }}"; do
            if [ "$outcome" != "success" ]; then
              echo "A test step did not succeed (outcome: $outcome)."
              result=1
            fi
          done
          exit $result
